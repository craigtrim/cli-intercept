site_name: cli-intercepts
site_description: Deterministic regex guardrails for Claude Code
site_url: https://cli-intercept.readthedocs.io/
repo_url: https://github.com/craigtrim/cli-intercept
repo_name: craigtrim/cli-intercept
edit_uri: edit/master/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search

nav:
  - Home: README.md
  - Claude Code hooks: claude-code-hooks.md
  - Integration: integration.md
  - Authoring the denylist: authoring-denylist.md
